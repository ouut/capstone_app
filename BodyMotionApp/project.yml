name: BodyMotionApp
options:
  bundleIdPrefix: com.bodyMotion
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"           # iPhone only
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    from: "125.0.0"

targets:
  BodyMotionApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
    dependencies:
      - package: WebRTC
    settings:
      base:
        INFOPLIST_FILE: "Info.plist"
        PRODUCT_BUNDLE_IDENTIFIER: com.bodyMotion.app
        DEVELOPMENT_TEAM: ""               # Fill in your Team ID
        CODE_SIGN_STYLE: Automatic
        PROVISIONING_PROFILE_SPECIFIER: ""
    preBuildScripts:
      - name: "SwiftLint (skip)"
        script: "echo 'skip'"
        basedOnDependencyAnalysis: false
